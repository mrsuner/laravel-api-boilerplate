; Application-level PHP overrides shared by dev and prod images.

memory_limit = 512M
post_max_size = 64M
upload_max_filesize = 64M
max_execution_time = 120
max_input_time = 120

date.timezone = UTC
expose_php = Off

; Logging — write to stderr so Docker captures it.
log_errors = On
error_log = /proc/self/fd/2
display_errors = Off
display_startup_errors = Off

; Sessions handled by Laravel; keep this conservative.
session.gc_maxlifetime = 7200

; realpath cache helps a lot under opcache.
realpath_cache_size = 4096K
realpath_cache_ttl = 600
