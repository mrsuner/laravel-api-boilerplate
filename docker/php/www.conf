; PHP-FPM pool tuned for containerised deployments.

[www]
user = www-data
group = www-data

listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 1000

; Send worker output to the container's stderr/stdout.
catch_workers_output = yes
decorate_workers_output = no
access.log = /proc/self/fd/2

clear_env = no
