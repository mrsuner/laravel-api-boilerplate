; Xdebug is installed in the dev image but only activates when XDEBUG_MODE is
; explicitly set (e.g. XDEBUG_MODE=debug,develop). Keep it off by default so
; local performance is not affected.

xdebug.mode = ${XDEBUG_MODE}
xdebug.start_with_request = trigger
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.log_level = 0
xdebug.discover_client_host = false
